<!DOCTYPE html>

    <header>
        <h1>Knox Social Command Centre</h1>

    <main>

        <section class="post-creator">
            <h2>Create Social Post</h2>

            <!-- Platform Selector Tabs -->
            <div class="platform-tabs">
                <!-- TODO: Add platform tab buttons (Instagram, Twitter, LinkedIn, TikTok) -->
                <!-- Use your AI prompt from PROMPTS.md to help build this -->
            </div>

            <!-- Post Brief Input -->
            <div class="brief-input">
                <!-- TODO: Add a textarea for the post brief -->
                <!-- e.g., "Promote Knox Stock Picker to tech-savvy traders" -->
            </div>

            <!-- CHALLENGE 2: Generate Button -->
            <div class="generate-section">
                <!-- TODO: Add a "Generate with AI" button -->
                <!-- When clicked, it should generate a caption + hashtags -->
            </div>

            <!-- CHALLENGE 3: Brand Voice Selector -->
            <div class="voice-selector">
                <!-- TODO: Add tone buttons: Professional, Casual, Hype, Gen Z -->
                <!-- Each should regenerate the caption in that tone -->
            </div>
        </section>

        <!-- CHALLENGE 4: Platform Preview -->
        <section class="preview-panel">
            <h2>Live Preview</h2>
            <!-- TODO: Show how the post looks on the selected platform -->
            <!-- Instagram = square card, Twitter = tweet, LinkedIn = professional -->
        </section>

    <script src="script.js"></script>
